name: Reusable Backend CI

on:
  workflow_call:

jobs:
  backend-ci:
    name: Backend Verification
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: alignops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Security Vulnerability Audit
        run: npm audit --audit-level=high || true

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Run Prisma Migrations on Test DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/alignops_test?schema=public

      - name: Test Prisma Seed Execution
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/alignops_test?schema=public

      - name: Static Analysis / TypeScript Linting
        run: npm run lint

      - name: Run Tests (Vitest)
        run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/alignops_test?schema=public
          JWT_SECRET: ci-test-jwt-secret-key-32-chars-long

      - name: Compile TS Build Verification
        run: npm run build
