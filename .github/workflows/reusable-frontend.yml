name: Reusable Frontend CI

on:
  workflow_call:

jobs:
  frontend-ci:
    name: Frontend Verification
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Next.js Cache Integration
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', 'frontend/next.config.ts') }}-${{ hashFiles('frontend/app/**.[jt]s', 'frontend/app/**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', 'frontend/next.config.ts') }}-

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Security Vulnerability Audit
        run: npm audit --audit-level=high || true

      - name: ESLint Verification
        run: npm run lint

      - name: Next.js Production Compilation
        run: npm run build
