apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  labels:
    {{- include "alignops.labels" . | nindent 4 }}
    app: postgres
spec:
  ports:
    - port: {{ .Values.postgres.service.port }}
  selector:
    app: postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    {{- include "alignops.labels" . | nindent 4 }}
    app: postgres
spec:
  serviceName: "postgres-db"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.dbName | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.dbUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alignops.fullname" . }}-secrets
                  key: postgres-password
          ports:
            - containerPort: {{ .Values.postgres.service.port }}
              name: postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.dbUser | quote }}, "-d", {{ .Values.postgres.dbName | quote }}]
            initialDelaySeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.dbUser | quote }}, "-d", {{ .Values.postgres.dbName | quote }}]
            initialDelaySeconds: 5
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: 
          - {{ .Values.postgres.storage.accessMode }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size | quote }}
