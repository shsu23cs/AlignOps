apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alignops-production
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-org/alignops.git'
    targetRevision: HEAD
    path: devops/helm/alignops # Points directly to our optimized Helm Chart
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
